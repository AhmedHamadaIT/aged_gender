buffer:
  jpeg_quality: 75
  size: 100
debounce:
  A3: 1
  A4: 1
  default: 3
evidence:
  log_rotate_mb: 100
  save_gif: true
  save_thumbnail: true
gif:
  fps: 10
  quality: 85
meta:
  version: 1.2.0
thresholds:
  config_reload_interval: 60
  customer_wait_max_seconds: 30
  drawer_open_max_seconds: 30
  proximity_iou: 0.05
zones:
  ROI_CASHIER:
    active: true
    points:
    - - 0.0
      - 0.0
    - - 0.5
      - 1.0
    shape: rectangle
  ROI_CUSTOMER:
    active: true
    points:
    - - 0.5
      - 0.0
    - - 1.0
      - 1.0
    shape: rectangle
